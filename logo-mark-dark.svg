<svg xmlns="http://www.w3.org/2000/svg" width="900" height="750" viewBox="0 0 900 750">
  <defs>
    <pattern id="p-hatch-d" x="0" y="0" width="6.5" height="900" patternUnits="userSpaceOnUse">
      <line x1="3.25" y1="0" x2="3.25" y2="900" stroke="rgba(255,255,255,0.12)" stroke-width="0.65"/>
    </pattern>
    <pattern id="p-hatch-dense-d" x="0" y="0" width="7" height="900" patternUnits="userSpaceOnUse">
      <line x1="3.5" y1="0" x2="3.5" y2="900" stroke="rgba(255,255,255,0.08)" stroke-width="0.75"/>
    </pattern>
    <clipPath id="cp-ghost-left-d"><polygon points="235,336 450,460 450,708 235,584"/></clipPath>
    <clipPath id="cp-ghost-right-d"><polygon points="450,460 665,336 665,584 450,708"/></clipPath>
    <clipPath id="cp-sol-top-d"><polygon points="311,398 450,318 589,398 450,478"/></clipPath>
    <clipPath id="cp-light-d"><polygon points="589,398 655,360 655,520 589,558"/></clipPath>
  </defs>

  <!-- NO BACKGROUND — transparent -->

  <!-- Vertical axis lines -->
  <line x1="450" y1="80" x2="450" y2="318" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <line x1="450" y1="638" x2="450" y2="740" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>

  <!-- Large outer wireframe hex -->
  <polygon points="450,212 665,336 665,584 450,708 235,584 235,336"
    fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.7"/>
  <line x1="450" y1="460" x2="450" y2="212" stroke="rgba(255,255,255,0.08)" stroke-width="0.55"/>
  <line x1="450" y1="460" x2="665" y2="336" stroke="rgba(255,255,255,0.08)" stroke-width="0.55"/>
  <line x1="450" y1="460" x2="665" y2="584" stroke="rgba(255,255,255,0.08)" stroke-width="0.55"/>
  <line x1="450" y1="460" x2="450" y2="708" stroke="rgba(255,255,255,0.08)" stroke-width="0.55"/>
  <line x1="450" y1="460" x2="235" y2="584" stroke="rgba(255,255,255,0.08)" stroke-width="0.55"/>
  <line x1="450" y1="460" x2="235" y2="336" stroke="rgba(255,255,255,0.08)" stroke-width="0.55"/>

  <!-- Ghost rhombus left — transparent fill with hatching -->
  <rect x="0" y="0" width="900" height="750"
        fill="url(#p-hatch-d)" clip-path="url(#cp-ghost-left-d)" opacity="0.6"/>
  <polygon points="235,336 450,460 450,708 235,584"
           fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.65"/>

  <!-- Ghost rhombus right -->
  <rect x="0" y="0" width="900" height="750"
        fill="url(#p-hatch-d)" clip-path="url(#cp-ghost-right-d)" opacity="0.5"/>
  <polygon points="450,460 665,336 665,584 450,708"
           fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.65"/>

  <!-- Medium wireframe hex -->
  <polygon points="450,268 616,364 616,556 450,652 284,556 284,364"
    fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.75"/>
  <line x1="450" y1="460" x2="450" y2="268" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
  <line x1="450" y1="460" x2="616" y2="364" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
  <line x1="450" y1="460" x2="284" y2="364" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>

  <!-- Small top wireframe cube -->
  <polygon points="450,258 523,300 523,384 450,426 377,384 377,300"
    fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.75"/>
  <line x1="450" y1="342" x2="450" y2="258" stroke="rgba(255,255,255,0.18)" stroke-width="0.65"/>
  <line x1="450" y1="342" x2="523" y2="300" stroke="rgba(255,255,255,0.18)" stroke-width="0.65"/>
  <line x1="450" y1="342" x2="377" y2="300" stroke="rgba(255,255,255,0.18)" stroke-width="0.65"/>
  <line x1="450" y1="342" x2="450" y2="426" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="450" y1="342" x2="523" y2="384" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="450" y1="342" x2="377" y2="384" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Main solid hex — same green tones, they pop on dark -->
  <polygon points="311,398 450,318 589,398 450,478" fill="#4E7A60"/>
  <rect x="0" y="0" width="900" height="750"
        fill="url(#p-hatch-dense-d)" clip-path="url(#cp-sol-top-d)" opacity="0.5"/>
  <polygon points="589,398 589,558 450,638 450,478" fill="#111A13"/>
  <polygon points="450,478 450,638 311,558 311,398" fill="#1C3E29"/>

  <!-- Light adjacent face -->
  <polygon points="589,398 655,360 655,520 589,558" fill="#D6DDD4" opacity="0.85"/>
  <rect x="0" y="0" width="900" height="750"
        fill="url(#p-hatch-d)" clip-path="url(#cp-light-d)" opacity="0.1"/>

  <!-- Solid hex outlines — brighter for dark bg -->
  <polygon points="311,398 450,318 589,398 450,478"
           fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
  <polygon points="589,398 589,558 450,638 450,478"
           fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>
  <polygon points="450,478 450,638 311,558 311,398"
           fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>

  <!-- No wordmark — pure geometric mark -->
</svg>
