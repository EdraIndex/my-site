<svg xmlns="http://www.w3.org/2000/svg" width="252" height="60" viewBox="0 0 252 60" fill="none" role="img" aria-label="EDRA — ESG Certification Index">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&amp;family=DM+Sans:opsz,wght@9..40,500&amp;display=swap');
    </style>
    <!-- Clip to inner mark area -->
    <clipPath id="bar-clip">
      <rect x="1" y="9" width="42" height="42" rx="5"/>
    </clipPath>
  </defs>

  <!-- ── Mark: Scoring card icon ── -->
  <!-- Outer border -->
  <rect x="1" y="9" width="42" height="42" rx="5" stroke="#C8A96E" stroke-width="1.5"/>

  <!-- Bar tracks (ghost, full-width) -->
  <rect x="7" y="19" width="29" height="5" rx="2.5" fill="#C8A96E" fill-opacity="0.1" clip-path="url(#bar-clip)"/>
  <rect x="7" y="28" width="29" height="5" rx="2.5" fill="#C8A96E" fill-opacity="0.1" clip-path="url(#bar-clip)"/>
  <rect x="7" y="37" width="29" height="5" rx="2.5" fill="#C8A96E" fill-opacity="0.1" clip-path="url(#bar-clip)"/>

  <!-- Bar fills — Plane A (82%), B (55%), C (31%) -->
  <rect x="7" y="19" width="24" height="5" rx="2.5" fill="#C8A96E" fill-opacity="0.95"/>
  <rect x="7" y="28" width="16" height="5" rx="2.5" fill="#C8A96E" fill-opacity="0.65"/>
  <rect x="7" y="37" width="9"  height="5" rx="2.5" fill="#C8A96E" fill-opacity="0.38"/>

  <!-- ── Wordmark ── -->
  <text
    x="58" y="37"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="30"
    font-weight="600"
    font-style="italic"
    fill="currentColor"
    letter-spacing="3">EDRA</text>

  <!-- ── Tagline ── -->
  <text
    x="59.5" y="52"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="7.5"
    font-weight="500"
    fill="#C8A96E"
    letter-spacing="2.6">ESG CERTIFICATION INDEX</text>
</svg>
